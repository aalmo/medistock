<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#0369a1" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- ── ICON MARK ── -->
  <!-- Rounded square -->
  <rect x="20" y="20" width="170" height="170" rx="40" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Glass sheen top half -->
  <rect x="20" y="20" width="170" height="85" rx="40" fill="white" opacity="0.10"/>

  <!-- Medical cross (white) -->
  <rect x="83"  y="57"  width="44" height="96" rx="12" fill="white"/>
  <rect x="57"  y="83"  width="96" height="44" rx="12" fill="white"/>

  <!-- Inventory bars bottom-right (over cross) -->
  <rect x="132" y="148" width="10" height="18" rx="3" fill="white" opacity="0.55"/>
  <rect x="146" y="139" width="10" height="27" rx="3" fill="white" opacity="0.75"/>
  <rect x="160" y="153" width="10" height="13" rx="3" fill="white" opacity="0.45"/>

  <!-- Accent dot top-right -->
  <circle cx="166" cy="36" r="12" fill="white" opacity="0.15"/>
  <circle cx="166" cy="36" r="7"  fill="#2dd4bf"/>

  <!-- ── WORDMARK ── -->
  <text x="215" y="133" font-size="78" font-weight="800" letter-spacing="-3" fill="#0f172a">Medi</text>
  <text x="394" y="133" font-size="78" font-weight="800" letter-spacing="-3" fill="url(#iconGrad)">Stock</text>

  <!-- Tagline -->
  <text x="216" y="163" font-size="13.5" font-weight="500" letter-spacing="2.2" fill="#94a3b8">MEDICATION SCHEDULING &amp; INVENTORY</text>

  <!-- Thin accent rule -->
  <rect x="216" y="174" width="405" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.45"/>
</svg>
